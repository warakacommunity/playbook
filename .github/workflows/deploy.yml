name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # This triggers the build every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build website
        run: yarn build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_PROXY_URL: ${{ secrets.OAUTH_PROXY_URL }}
          TRANSLATION_PROXY_URL: ${{ secrets.TRANSLATION_PROXY_URL }}

      - name: Generate Playbook PDF
        run: yarn pdf:built

      - name: Copy PDF into build output
        run: mkdir -p build/downloads && cp static/downloads/masakhane-playbook.pdf build/downloads/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build # Docusaurus builds into the 'build' folder
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'