<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif" role="img" aria-labelledby="diagTitle">
  <title id="diagTitle">Speaker diarization — who spoke when, plus the Diarization Error Rate breakdown</title>

  <!-- Outer self-contained card -->
  <rect x="8" y="8" width="904" height="604" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- Header -->
  <text x="32" y="52" font-size="22" font-weight="700" fill="#2B2218">Who spoke when</text>
  <text x="32" y="76" font-size="14" fill="#8A7D6E">Speaker turns on a shared time axis — and how the error rate breaks down</text>

  <!-- ============ TIMELINE PANEL ============ -->
  <rect x="32" y="100" width="856" height="208" rx="12" fill="#FFFFFF" stroke="#E7DDCB" stroke-width="1.5"/>
  <text x="52" y="128" font-size="15" font-weight="700" fill="#2B2218">Timeline · panel_01</text>

  <!-- Lane labels -->
  <text x="52" y="172" font-size="13" font-weight="600" fill="#9C4F2B">Speaker A</text>
  <text x="52" y="222" font-size="13" font-weight="600" fill="#1F5B3F">Speaker B</text>

  <!-- Lane baselines -->
  <line x1="150" y1="178" x2="858" y2="178" stroke="#E7DDCB" stroke-width="1"/>
  <line x1="150" y1="228" x2="858" y2="228" stroke="#E7DDCB" stroke-width="1"/>

  <!-- Speaker A segments (terracotta) -->
  <rect x="150" y="152" width="200" height="34" rx="8" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="250" y="174" font-size="13" fill="#9C4F2B" text-anchor="middle">spk_A · 0.00–3.45</text>

  <rect x="470" y="152" width="170" height="34" rx="8" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="555" y="174" font-size="13" fill="#9C4F2B" text-anchor="middle">spk_A · 5.10–6.90</text>

  <!-- Speaker B segments (forest green) -->
  <rect x="320" y="202" width="200" height="34" rx="8" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="420" y="224" font-size="13" fill="#1F5B3F" text-anchor="middle">spk_B · 3.20–5.50</text>

  <!-- Overlap region (deep rust) where A and B coincide: ~3.20–3.45 -->
  <rect x="320" y="148" width="30" height="92" rx="8" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
  <line x1="335" y1="148" x2="335" y2="240" stroke="#8A3B25" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="335" y="256" font-size="13" font-weight="600" fill="#8A3B25" text-anchor="middle">Overlap</text>
  <text x="335" y="272" font-size="12" fill="#8A7D6E" text-anchor="middle">two voices at once</text>

  <!-- Time axis -->
  <line x1="150" y1="298" x2="858" y2="298" stroke="#CBBBA4" stroke-width="1.5"/>
  <g font-size="12" fill="#8A7D6E" text-anchor="middle">
    <line x1="150" y1="294" x2="150" y2="302" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="150" y="290">0s</text>
    <line x1="327" y1="294" x2="327" y2="302" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="327" y="290">2s</text>
    <line x1="504" y1="294" x2="504" y2="302" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="504" y="290">4s</text>
    <line x1="681" y1="294" x2="681" y2="302" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="681" y="290">6s</text>
    <line x1="858" y1="294" x2="858" y2="302" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="840" y="290">time →</text>
  </g>

  <!-- ============ DER BREAKDOWN ============ -->
  <text x="32" y="344" font-size="16" font-weight="700" fill="#2B2218">Diarization Error Rate (DER) = sum of three components</text>

  <!-- Chip 1: Missed speech (gold) -->
  <rect x="32" y="360" width="272" height="98" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
  <text x="52" y="388" font-size="15" font-weight="700" fill="#B97F37">Missed speech</text>
  <text x="52" y="412" font-size="13" fill="#2B2218">Reference speech the system</text>
  <text x="52" y="430" font-size="13" fill="#2B2218">left unlabelled.</text>
  <text x="52" y="450" font-size="12" fill="#8A7D6E">Worst over overlapping speech.</text>

  <!-- Chip 2: False alarm (terracotta) -->
  <rect x="324" y="360" width="272" height="98" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="344" y="388" font-size="15" font-weight="700" fill="#9C4F2B">False alarm</text>
  <text x="344" y="412" font-size="13" fill="#2B2218">Non-speech labelled as</text>
  <text x="344" y="430" font-size="13" fill="#2B2218">speech.</text>
  <text x="344" y="450" font-size="12" fill="#8A7D6E">High → phone-recorded noise.</text>

  <!-- Chip 3: Speaker confusion (forest green) -->
  <rect x="616" y="360" width="272" height="98" rx="12" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="636" y="388" font-size="15" font-weight="700" fill="#1F5B3F">Speaker confusion</text>
  <text x="636" y="412" font-size="13" fill="#2B2218">Right speech, wrong speaker</text>
  <text x="636" y="430" font-size="13" fill="#2B2218">label.</text>
  <text x="636" y="450" font-size="12" fill="#8A7D6E">High → overlap &amp; code-switching.</text>

  <!-- JER + collar note -->
  <rect x="32" y="474" width="856" height="50" rx="10" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>
  <circle cx="56" cy="499" r="5" fill="#2E7D5B"/>
  <text x="72" y="496" font-size="13" font-weight="600" fill="#2B2218">JER (Jaccard Error Rate):</text>
  <text x="72" y="514" font-size="12.5" fill="#8A7D6E">weights every speaker equally, regardless of how much they talk.</text>
  <circle cx="486" cy="499" r="5" fill="#B97F37"/>
  <text x="502" y="496" font-size="13" font-weight="600" fill="#2B2218">Collar = 0.25s:</text>
  <text x="502" y="514" font-size="12.5" fill="#8A7D6E">a grace window around boundaries, so small timing slips are forgiven.</text>

  <!-- ============ AFRICAN-AUDIO CHALLENGES ============ -->
  <text x="32" y="556" font-size="14" font-weight="700" fill="#2B2218">What makes African audio hard</text>
  <g font-size="13">
    <rect x="32" y="566" width="168" height="30" rx="10" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
    <text x="116" y="586" fill="#8A3B25" text-anchor="middle">Overlapping speech</text>

    <rect x="212" y="566" width="168" height="30" rx="10" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
    <text x="296" y="586" fill="#B97F37" text-anchor="middle">Code-switching</text>

    <rect x="392" y="566" width="208" height="30" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="496" y="586" fill="#9C4F2B" text-anchor="middle">Phone-recorded noise</text>
  </g>
  <text x="888" y="586" font-size="11.5" fill="#8A7D6E" text-anchor="end">Labels stored as RTTM · scored with pyannote.metrics</text>
</svg>
