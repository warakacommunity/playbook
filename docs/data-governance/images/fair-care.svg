<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="100%" role="img" aria-labelledby="title desc" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif">
  <title id="title">FAIR and CARE: complementary frameworks for governing African-language data</title>
  <desc id="desc">Two side-by-side columns. FAIR (green) makes data usable: Findable, Accessible, Interoperable, Reusable. CARE (terracotta) makes data just: Collective benefit, Authority to control, Responsibility, Ethics. FAIR without CARE is well-documented extraction.</desc>

  <!-- Outer self-contained card -->
  <rect x="1" y="1" width="878" height="618" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- Header -->
  <text x="440" y="56" text-anchor="middle" font-size="23" font-weight="700" fill="#2B2218">FAIR and CARE, together</text>
  <text x="440" y="82" text-anchor="middle" font-size="14" fill="#8A7D6E">Two frameworks that answer different questions &#8212; use both.</text>

  <!-- ============ FAIR column (green) ============ -->
  <g>
    <rect x="40" y="104" width="376" height="392" rx="12" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1.5"/>

    <!-- column header -->
    <text x="64" y="142" font-size="30" font-weight="700" fill="#1F5B3F">FAIR</text>
    <text x="64" y="166" font-size="14.5" font-weight="600" fill="#2E7D5B">makes data usable</text>
    <line x1="64" y1="182" x2="392" y2="182" stroke="#CBBBA4" stroke-width="1.5"/>

    <!-- F -->
    <rect x="64" y="198" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#2E7D5B" stroke-width="1.5"/>
    <text x="80" y="226" font-size="15" font-weight="700" fill="#1F5B3F">Findable</text>
    <text x="80" y="246" font-size="13" fill="#2B2218">Data can be located and indexed.</text>
    <circle cx="376" cy="228" r="16" fill="#1F5B3F"/>
    <text x="376" y="234" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">F</text>

    <!-- A -->
    <rect x="64" y="270" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#2E7D5B" stroke-width="1.5"/>
    <text x="80" y="298" font-size="15" font-weight="700" fill="#1F5B3F">Accessible</text>
    <text x="80" y="318" font-size="13" fill="#2B2218">It can be retrieved under clear terms.</text>
    <circle cx="376" cy="300" r="16" fill="#1F5B3F"/>
    <text x="376" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">A</text>

    <!-- I -->
    <rect x="64" y="342" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#2E7D5B" stroke-width="1.5"/>
    <text x="80" y="370" font-size="15" font-weight="700" fill="#1F5B3F">Interoperable</text>
    <text x="80" y="390" font-size="13" fill="#2B2218">Works with other data and tools.</text>
    <circle cx="376" cy="372" r="16" fill="#1F5B3F"/>
    <text x="376" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">I</text>

    <!-- R -->
    <rect x="64" y="414" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#2E7D5B" stroke-width="1.5"/>
    <text x="80" y="442" font-size="15" font-weight="700" fill="#1F5B3F">Reusable</text>
    <text x="80" y="462" font-size="13" fill="#2B2218">Documented well enough to use again.</text>
    <circle cx="376" cy="444" r="16" fill="#1F5B3F"/>
    <text x="376" y="450" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">R</text>
  </g>

  <!-- ============ CARE column (terracotta) ============ -->
  <g>
    <rect x="464" y="104" width="376" height="392" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>

    <!-- column header -->
    <text x="488" y="142" font-size="30" font-weight="700" fill="#9C4F2B">CARE</text>
    <text x="488" y="166" font-size="14.5" font-weight="600" fill="#C66A3D">makes data just</text>
    <line x1="488" y1="182" x2="816" y2="182" stroke="#CBBBA4" stroke-width="1.5"/>

    <!-- C -->
    <rect x="488" y="198" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="504" y="226" font-size="15" font-weight="700" fill="#9C4F2B">Collective benefit</text>
    <text x="504" y="246" font-size="13" fill="#2B2218">Value returns to the community.</text>
    <circle cx="800" cy="228" r="16" fill="#9C4F2B"/>
    <text x="800" y="234" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">C</text>

    <!-- A -->
    <rect x="488" y="270" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="504" y="298" font-size="15" font-weight="700" fill="#9C4F2B">Authority to control</text>
    <text x="504" y="318" font-size="13" fill="#2B2218">The community decides what is shared.</text>
    <circle cx="800" cy="300" r="16" fill="#9C4F2B"/>
    <text x="800" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">A</text>

    <!-- R -->
    <rect x="488" y="342" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="504" y="370" font-size="15" font-weight="700" fill="#9C4F2B">Responsibility</text>
    <text x="504" y="390" font-size="13" fill="#2B2218">Serve the community, not just study it.</text>
    <circle cx="800" cy="372" r="16" fill="#9C4F2B"/>
    <text x="800" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">R</text>

    <!-- E -->
    <rect x="488" y="414" width="288" height="60" rx="10" fill="#FFFFFF" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="504" y="442" font-size="15" font-weight="700" fill="#9C4F2B">Ethics</text>
    <text x="504" y="462" font-size="13" fill="#2B2218">Rights and dignity guide every choice.</text>
    <circle cx="800" cy="444" r="16" fill="#9C4F2B"/>
    <text x="800" y="450" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">E</text>
  </g>

  <!-- Connector: complementary -->
  <line x1="416" y1="300" x2="464" y2="300" stroke="#CBBBA4" stroke-width="2"/>
  <circle cx="440" cy="300" r="15" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
  <text x="440" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#B97F37">+</text>

  <!-- Footer banner: the warning line -->
  <rect x="40" y="516" width="800" height="80" rx="12" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
  <rect x="40" y="516" width="6" height="80" rx="3" fill="#8A3B25"/>
  <text x="440" y="552" text-anchor="middle" font-size="17" font-weight="700" fill="#8A3B25">FAIR without CARE is well-documented extraction.</text>
  <text x="440" y="578" text-anchor="middle" font-size="13.5" fill="#2B2218">Data can be perfectly FAIR and still be taken from a community that gets nothing back.</text>
</svg>
