<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif">
  <title>Data sources for text classification</title>

  <!-- Outer self-contained card -->
  <rect x="1" y="1" width="938" height="418" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- ================= ROW 1 ================= -->

  <!-- Social media (Terracotta) -->
  <g transform="translate(24,24)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
    <path d="M9 12c0 6 4.5 10 10 10c6.5 0 10-5.5 9.7-10.2c0.7-0.5 1.3-1.2 1.7-2c-0.6 0.3-1.3 0.5-2 0.6c0.7-0.4 1.3-1.1 1.5-1.9c-0.7 0.4-1.4 0.7-2.2 0.9c-1.4-1.5-3.9-1.2-4.9 0.5c-0.3 0.6-0.4 1.2-0.2 1.9c-2.7-0.1-5.1-1.4-6.7-3.5c-0.9 1.5-0.4 3.4 1 4.3c-0.5 0-1-0.2-1.5-0.4c0 1.6 1.1 2.9 2.6 3.2c-0.4 0.1-0.9 0.1-1.4 0.1c0.4 1.3 1.6 2.2 3 2.2c-1.3 1-3 1.5-4.6 1.4z" fill="#C66A3D"/>
    <text x="40" y="20" font-size="15" font-weight="600" fill="#9C4F2B">Social media</text>
    <text x="0" y="52" font-size="11" fill="#2B2218">Rich, real-time opinions — but noisy and informal. Key</text>
    <text x="0" y="68" font-size="11" fill="#2B2218">for hate speech &amp; emotion tasks.</text>
    <!-- chips -->
    <g font-size="10.5" fill="#9C4F2B">
      <rect x="0" y="80" width="74" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="14" y="94">Twitter (X)</text>
      <rect x="80" y="80" width="76" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="94" y="94">Facebook</text>
      <rect x="162" y="80" width="60" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="176" y="94">Reddit</text>
      <rect x="0" y="106" width="70" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="14" y="120">YouTube</text>
      <rect x="76" y="106" width="56" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="90" y="120">TikTok</text>
      <rect x="138" y="106" width="68" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="152" y="120">Telegram</text>
      <rect x="0" y="132" width="74" height="20" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/><text x="14" y="146">WhatsApp</text>
    </g>
  </g>

  <!-- Product reviews (Forest green) -->
  <g transform="translate(330,24)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
    <path d="M9 11h12l-1 8h-10z" fill="none" stroke="#1F5B3F" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M12 11v-1a3 3 0 0 1 6 0v1" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
    <text x="40" y="20" font-size="15" font-weight="600" fill="#1F5B3F">Product reviews</text>
    <text x="0" y="52" font-size="11" fill="#2B2218">Clearer sentiment signals — structured opinions tied to</text>
    <text x="0" y="68" font-size="11" fill="#2B2218">a rated product.</text>
    <g font-size="10.5" fill="#1F5B3F">
      <rect x="0" y="80" width="70" height="20" rx="10" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1"/><text x="16" y="94">Amazon</text>
      <rect x="76" y="80" width="48" height="20" rx="10" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1"/><text x="90" y="94">Yelp</text>
    </g>
  </g>

  <!-- Forums & comments (Gold) -->
  <g transform="translate(636,24)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
    <path d="M9 10h12a1.5 1.5 0 0 1 1.5 1.5v6a1.5 1.5 0 0 1-1.5 1.5h-8l-3.5 3v-3h-0.5a1.5 1.5 0 0 1-1.5-1.5v-6a1.5 1.5 0 0 1 1.5-1.5z" fill="none" stroke="#B97F37" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="40" y="20" font-size="15" font-weight="600" fill="#B97F37">Forums &amp; comments</text>
    <text x="0" y="52" font-size="11" fill="#2B2218">Diverse viewpoints across topics — useful for broad</text>
    <text x="0" y="68" font-size="11" fill="#2B2218">coverage.</text>
    <g font-size="10.5" fill="#B97F37">
      <rect x="0" y="80" width="52" height="20" rx="10" fill="#F8ECD6" stroke="#B97F37" stroke-width="1"/><text x="14" y="94">Blogs</text>
      <rect x="58" y="80" width="76" height="20" rx="10" fill="#F8ECD6" stroke="#B97F37" stroke-width="1"/><text x="72" y="94">News sites</text>
      <rect x="140" y="80" width="60" height="20" rx="10" fill="#F8ECD6" stroke="#B97F37" stroke-width="1"/><text x="154" y="94">Reddit</text>
    </g>
  </g>

  <!-- ================= ROW 2 ================= -->

  <!-- Surveys & collected data (Deep rust) -->
  <g transform="translate(24,236)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
    <rect x="9" y="9" width="12" height="12" rx="2" fill="none" stroke="#8A3B25" stroke-width="1.5"/>
    <path d="M11.5 15l2 2l4-4.5" fill="none" stroke="#8A3B25" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="20" font-size="15" font-weight="600" fill="#8A3B25">Surveys &amp; collected data</text>
    <text x="0" y="52" font-size="11" fill="#2B2218">Controlled and cleaner data — smaller volumes but</text>
    <text x="0" y="68" font-size="11" fill="#2B2218">higher label quality.</text>
    <g font-size="10.5" fill="#8A3B25">
      <rect x="0" y="80" width="98" height="20" rx="10" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1"/><text x="14" y="94">Questionnaires</text>
      <rect x="104" y="80" width="92" height="20" rx="10" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1"/><text x="118" y="94">Focus groups</text>
      <rect x="0" y="106" width="100" height="20" rx="10" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1"/><text x="14" y="120">Annotation tasks</text>
    </g>
  </g>

  <!-- Existing datasets (Mid green) -->
  <g transform="translate(330,236)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1.5"/>
    <ellipse cx="15" cy="10.5" rx="6" ry="2.5" fill="none" stroke="#2E7D5B" stroke-width="1.5"/>
    <path d="M9 10.5v5c0 1.4 2.7 2.5 6 2.5s6-1.1 6-2.5v-5" fill="none" stroke="#2E7D5B" stroke-width="1.5"/>
    <path d="M9 13c0 1.4 2.7 2.5 6 2.5s6-1.1 6-2.5" fill="none" stroke="#2E7D5B" stroke-width="1.5"/>
    <text x="40" y="20" font-size="15" font-weight="600" fill="#2E7D5B">Existing datasets</text>
    <text x="0" y="52" font-size="11" fill="#2B2218">Benchmark corpora for faster start — may not match</text>
    <text x="0" y="68" font-size="11" fill="#2B2218">your domain.</text>
    <g font-size="10.5" fill="#2E7D5B">
      <rect x="0" y="80" width="118" height="20" rx="10" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1"/><text x="14" y="94">Benchmark corpora</text>
      <rect x="124" y="80" width="132" height="20" rx="10" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1"/><text x="138" y="94">HuggingFace datasets</text>
      <rect x="0" y="106" width="142" height="20" rx="10" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1"/><text x="14" y="120">Published research data</text>
    </g>
  </g>

</svg>
