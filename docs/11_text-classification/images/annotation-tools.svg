<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 470" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif" role="img" aria-labelledby="title">
  <title id="title">Annotation tools compared: Crowdsourcing, In-house Tools, and Spreadsheets — scale and control ratings</title>

  <!-- ===================== CARD 1: CROWDSOURCING (terracotta) ===================== -->
  <g>
    <rect x="8" y="8" width="320" height="416" rx="12" fill="#FFFFFF" stroke="#E7DDCB"/>
    <!-- top accent bar -->
    <rect x="8" y="8" width="320" height="4" rx="2" fill="#C66A3D"/>

    <!-- tag chip -->
    <rect x="28" y="32" width="172" height="20" rx="10" fill="#FBEDE3"/>
    <text x="40" y="46" font-size="9" font-weight="700" letter-spacing="1.2" fill="#9C4F2B">EXTERNAL · HOSTED</text>

    <!-- title -->
    <text x="28" y="78" font-size="20" font-weight="700" fill="#C66A3D">Crowdsourcing</text>

    <!-- description -->
    <text font-size="11.5" fill="#2B2218">
      <tspan x="28" y="104">On-demand remote annotators sourced and paid</tspan>
      <tspan x="28" y="121">through a labeled platform, selected by profile</tspan>
      <tspan x="28" y="138">and qualification tests.</tspan>
    </text>

    <!-- BEST FOR -->
    <text x="28" y="166" font-size="9" font-weight="700" letter-spacing="1" fill="#C66A3D">BEST FOR</text>
    <text font-size="11.5" font-weight="600" fill="#2B2218">
      <tspan x="28" y="184">Large data volumes &amp; widely spoken languages</tspan>
    </text>

    <!-- EXAMPLE TOOLS -->
    <text x="28" y="214" font-size="9" font-weight="700" letter-spacing="1" fill="#8A7D6E">EXAMPLE TOOLS</text>
    <g font-size="10.5" font-weight="600" fill="#9C4F2B">
      <rect x="28" y="224" width="64" height="22" rx="11" fill="#FBEDE3" stroke="#E0A458" stroke-opacity="0"/>
      <text x="60" y="239" text-anchor="middle">Toloka AI</text>
      <rect x="100" y="224" width="90" height="22" rx="11" fill="#FBEDE3"/>
      <text x="145" y="239" text-anchor="middle">Amazon MTurk</text>
      <rect x="198" y="224" width="58" height="22" rx="11" fill="#FBEDE3"/>
      <text x="227" y="239" text-anchor="middle">Prolific</text>
      <rect x="264" y="224" width="50" height="22" rx="11" fill="#FBEDE3"/>
      <text x="289" y="239" text-anchor="middle">Appen</text>
    </g>

    <!-- WATCH OUT -->
    <text x="28" y="278" font-size="9" font-weight="700" letter-spacing="1" fill="#8A7D6E">WATCH OUT</text>
    <text font-size="11" font-style="italic" fill="#8A7D6E">
      <tspan x="28" y="296">Data leaves your environment; quality needs</tspan>
      <tspan x="28" y="312">active task design &amp; gold checks.</tspan>
    </text>

    <!-- divider -->
    <line x1="28" y1="338" x2="308" y2="338" stroke="#E7DDCB"/>

    <!-- ratings -->
    <text x="28" y="366" font-size="11" fill="#8A7D6E">Scale</text>
    <g>
      <circle cx="120" cy="362" r="6" fill="#C66A3D"/>
      <circle cx="142" cy="362" r="6" fill="#C66A3D"/>
      <circle cx="164" cy="362" r="6" fill="#C66A3D"/>
      <circle cx="186" cy="362" r="6" fill="#C66A3D"/>
    </g>
    <text x="28" y="394" font-size="11" fill="#8A7D6E">Control</text>
    <g>
      <circle cx="120" cy="390" r="6" fill="#C66A3D"/>
      <circle cx="142" cy="390" r="6" fill="#E7DDCB"/>
      <circle cx="164" cy="390" r="6" fill="#E7DDCB"/>
      <circle cx="186" cy="390" r="6" fill="#E7DDCB"/>
    </g>
  </g>

  <!-- ===================== CARD 2: IN-HOUSE TOOLS (forest green) ===================== -->
  <g>
    <rect x="352" y="8" width="320" height="416" rx="12" fill="#FFFFFF" stroke="#E7DDCB"/>
    <rect x="352" y="8" width="320" height="4" rx="2" fill="#1F5B3F"/>

    <rect x="372" y="32" width="186" height="20" rx="10" fill="#E7F1EC"/>
    <text x="384" y="46" font-size="9" font-weight="700" letter-spacing="1.2" fill="#1F5B3F">IN-HOUSE · SELF-HOSTED</text>

    <text x="372" y="78" font-size="20" font-weight="700" fill="#1F5B3F">In-house Tools</text>

    <text font-size="11.5" fill="#2B2218">
      <tspan x="372" y="104">Open-source apps deployed on your own</tspan>
      <tspan x="372" y="121">machine and labeled by a hand-picked, trusted</tspan>
      <tspan x="372" y="138">team of annotators.</tspan>
    </text>

    <text x="372" y="166" font-size="9" font-weight="700" letter-spacing="1" fill="#1F5B3F">BEST FOR</text>
    <text font-size="11.5" font-weight="600" fill="#2B2218">
      <tspan x="372" y="184">Sensitive data, domain experts &amp; low-resource</tspan>
      <tspan x="372" y="200">languages</tspan>
    </text>

    <text x="372" y="228" font-size="9" font-weight="700" letter-spacing="1" fill="#8A7D6E">EXAMPLE TOOLS</text>
    <g font-size="10.5" font-weight="600" fill="#1F5B3F">
      <rect x="372" y="238" width="64" height="22" rx="11" fill="#E7F1EC"/>
      <text x="404" y="253" text-anchor="middle">POTATO</text>
      <rect x="444" y="238" width="82" height="22" rx="11" fill="#E7F1EC"/>
      <text x="485" y="253" text-anchor="middle">Label Studio</text>
      <rect x="534" y="238" width="66" height="22" rx="11" fill="#E7F1EC"/>
      <text x="567" y="253" text-anchor="middle">Doccano</text>
      <rect x="372" y="266" width="78" height="22" rx="11" fill="#E7F1EC"/>
      <text x="411" y="281" text-anchor="middle">INCEpTION</text>
      <rect x="458" y="266" width="92" height="22" rx="11" fill="#E7F1EC"/>
      <text x="504" y="281" text-anchor="middle">AfriAnnotate</text>
    </g>

    <text x="372" y="318" font-size="9" font-weight="700" letter-spacing="1" fill="#8A7D6E">WATCH OUT</text>
    <text font-size="11" font-style="italic" fill="#8A7D6E">
      <tspan x="372" y="336">Setup &amp; hosting effort; throughput limited by</tspan>
      <tspan x="372" y="352">team size.</tspan>
    </text>

    <line x1="372" y1="364" x2="652" y2="364" stroke="#E7DDCB"/>

    <text x="372" y="388" font-size="11" fill="#8A7D6E">Scale</text>
    <g>
      <circle cx="464" cy="384" r="6" fill="#1F5B3F"/>
      <circle cx="486" cy="384" r="6" fill="#1F5B3F"/>
      <circle cx="508" cy="384" r="6" fill="#E7DDCB"/>
      <circle cx="530" cy="384" r="6" fill="#E7DDCB"/>
    </g>
    <text x="372" y="412" font-size="11" fill="#8A7D6E">Control</text>
    <g>
      <circle cx="464" cy="408" r="6" fill="#1F5B3F"/>
      <circle cx="486" cy="408" r="6" fill="#1F5B3F"/>
      <circle cx="508" cy="408" r="6" fill="#1F5B3F"/>
      <circle cx="530" cy="408" r="6" fill="#1F5B3F"/>
    </g>
  </g>

  <!-- ===================== CARD 3: SPREADSHEETS (gold) ===================== -->
  <g>
    <rect x="696" y="8" width="320" height="416" rx="12" fill="#FFFFFF" stroke="#E7DDCB"/>
    <rect x="696" y="8" width="320" height="4" rx="2" fill="#B97F37"/>

    <rect x="716" y="32" width="110" height="20" rx="10" fill="#F8ECD6"/>
    <text x="728" y="46" font-size="9" font-weight="700" letter-spacing="1.2" fill="#B97F37">LIGHTWEIGHT</text>

    <text x="716" y="78" font-size="20" font-weight="700" fill="#B97F37">Spreadsheets</text>

    <text font-size="11.5" fill="#2B2218">
      <tspan x="716" y="104">General-purpose spreadsheets with dropdown-</tspan>
      <tspan x="716" y="121">constrained labels — zero setup for quick, small</tspan>
      <tspan x="716" y="138">tasks.</tspan>
    </text>

    <text x="716" y="166" font-size="9" font-weight="700" letter-spacing="1" fill="#B97F37">BEST FOR</text>
    <text font-size="11.5" font-weight="600" fill="#2B2218">
      <tspan x="716" y="184">Pilots, guideline development &amp; very small</tspan>
      <tspan x="716" y="200">datasets</tspan>
    </text>

    <text x="716" y="228" font-size="9" font-weight="700" letter-spacing="1" fill="#8A7D6E">EXAMPLE TOOLS</text>
    <g font-size="10.5" font-weight="600" fill="#B97F37">
      <rect x="716" y="238" width="92" height="22" rx="11" fill="#F8ECD6"/>
      <text x="762" y="253" text-anchor="middle">Google Sheets</text>
      <rect x="816" y="238" width="98" height="22" rx="11" fill="#F8ECD6"/>
      <text x="865" y="253" text-anchor="middle">Microsoft Excel</text>
    </g>

    <text x="716" y="318" font-size="9" font-weight="700" letter-spacing="1" fill="#8A7D6E">WATCH OUT</text>
    <text font-size="11" font-style="italic" fill="#8A7D6E">
      <tspan x="716" y="336">No native double-annotation, adjudication, or</tspan>
      <tspan x="716" y="352">inter-annotator agreement.</tspan>
    </text>

    <line x1="716" y1="364" x2="996" y2="364" stroke="#E7DDCB"/>

    <text x="716" y="388" font-size="11" fill="#8A7D6E">Scale</text>
    <g>
      <circle cx="808" cy="384" r="6" fill="#B97F37"/>
      <circle cx="830" cy="384" r="6" fill="#E7DDCB"/>
      <circle cx="852" cy="384" r="6" fill="#E7DDCB"/>
      <circle cx="874" cy="384" r="6" fill="#E7DDCB"/>
    </g>
    <text x="716" y="412" font-size="11" fill="#8A7D6E">Control</text>
    <g>
      <circle cx="808" cy="408" r="6" fill="#B97F37"/>
      <circle cx="830" cy="408" r="6" fill="#B97F37"/>
      <circle cx="852" cy="408" r="6" fill="#B97F37"/>
      <circle cx="874" cy="408" r="6" fill="#B97F37"/>
    </g>
  </g>

  <!-- ===================== FOOTER CAPTION ===================== -->
  <text x="512" y="452" text-anchor="middle" font-size="10.5" fill="#8A7D6E">Scale = data volume the approach supports  |  Control = direct oversight of who annotates and where data lives</text>
</svg>
