<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif">
  <title>Data processing pipeline for text classification</title>

  <!-- Outer self-contained card -->
  <rect x="1" y="1" width="938" height="558" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- ============ PIPELINE STEP GRID (3 x 2) ============ -->
  <!-- Card 01: Data selection (Forest green) -->
  <g transform="translate(24,24)">
    <rect x="0" y="0" width="288" height="124" rx="12" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
    <text x="16" y="22" font-size="11.5" font-weight="700" fill="#1F5B3F">01 · Data selection</text>
    <text x="16" y="42" font-size="15" font-weight="700" fill="#2B2218">Representative sampling</text>
    <text x="16" y="64" font-size="11" fill="#2B2218">Keyword-based selection for bias</text>
    <text x="16" y="80" font-size="11" fill="#2B2218">control across hate speech &amp; emotion</text>
    <text x="16" y="96" font-size="11" fill="#2B2218">tasks</text>
  </g>

  <!-- Card 02: Data cleaning (Deep rust soft) -->
  <g transform="translate(326,24)">
    <rect x="0" y="0" width="288" height="124" rx="12" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
    <text x="16" y="22" font-size="11.5" font-weight="700" fill="#8A3B25">02 · Data cleaning</text>
    <text x="16" y="42" font-size="15" font-weight="700" fill="#2B2218">Remove noise</text>
    <text x="16" y="64" font-size="11" fill="#2B2218">Strip HTML tags, whitespace;</text>
    <text x="16" y="80" font-size="11" fill="#2B2218">automated via regex &amp; text libraries</text>
  </g>

  <!-- Card 03: Language ID (Gold) -->
  <g transform="translate(628,24)">
    <rect x="0" y="0" width="288" height="124" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
    <text x="16" y="22" font-size="11.5" font-weight="700" fill="#B97F37">03 · Language ID</text>
    <text x="16" y="42" font-size="15" font-weight="700" fill="#2B2218">Uniform language</text>
    <text x="16" y="64" font-size="11" fill="#2B2218">Ensure consistency across multilingual</text>
    <text x="16" y="80" font-size="11" fill="#2B2218">&amp; mixed-language sources</text>
  </g>

  <!-- Card 04: De-duplication (Terracotta) -->
  <g transform="translate(24,160)">
    <rect x="0" y="0" width="288" height="124" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="16" y="22" font-size="11.5" font-weight="700" fill="#9C4F2B">04 · De-duplication</text>
    <text x="16" y="42" font-size="15" font-weight="700" fill="#2B2218">Eliminate repeats</text>
    <text x="16" y="64" font-size="11" fill="#2B2218">Remove duplicate entries that skew</text>
    <text x="16" y="80" font-size="11" fill="#2B2218">model training &amp; evaluation</text>
  </g>

  <!-- Card 05: Dataset sizing (Forest mid) -->
  <g transform="translate(326,160)">
    <rect x="0" y="0" width="288" height="124" rx="12" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1.5"/>
    <text x="16" y="22" font-size="11.5" font-weight="700" fill="#2E7D5B">05 · Dataset sizing</text>
    <text x="16" y="42" font-size="15" font-weight="700" fill="#2B2218">Scope the corpus</text>
    <text x="16" y="64" font-size="11" fill="#2B2218">Balance budget, time, human resources</text>
    <text x="16" y="80" font-size="11" fill="#2B2218">&amp; available data volume</text>
  </g>

  <!-- Card 06: Quality check (Gold accent) -->
  <g transform="translate(628,160)">
    <rect x="0" y="0" width="288" height="124" rx="12" fill="#F8ECD6" stroke="#E0A458" stroke-width="1.5"/>
    <text x="16" y="22" font-size="11.5" font-weight="700" fill="#B97F37">06 · Quality check</text>
    <text x="16" y="42" font-size="15" font-weight="700" fill="#2B2218">Validate &amp; review</text>
    <text x="16" y="64" font-size="11" fill="#2B2218">Spot-check samples, inter-annotator</text>
    <text x="16" y="80" font-size="11" fill="#2B2218">agreement, label consistency</text>
  </g>

  <!-- Connector note 1 -->
  <g transform="translate(470,316)" text-anchor="middle">
    <text x="-180" y="4" font-size="13" fill="#8A7D6E">&#8595;</text>
    <text x="0" y="4" font-size="12" fill="#8A7D6E">processed corpus ready for sampling</text>
    <text x="180" y="4" font-size="13" fill="#8A7D6E">&#8595;</text>
  </g>

  <!-- Sample selection banner (Forest green emphasis) -->
  <g transform="translate(24,338)">
    <rect x="0" y="0" width="892" height="60" rx="12" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1.5"/>
    <path d="M22 18h22l-8 9v11l-6-3v-8z" fill="none" stroke="#1F5B3F" stroke-width="1.6" stroke-linejoin="round"/>
    <text x="62" y="26" font-size="15" font-weight="700" fill="#1F5B3F">Sample selection</text>
    <text x="62" y="46" font-size="12" fill="#1F5B3F">Draw representative, stratified samples from the final cleaned corpus for annotation &amp; modelling</text>
  </g>

  <!-- Connector note 2 -->
  <g transform="translate(470,426)" text-anchor="middle">
    <text x="-118" y="4" font-size="12" fill="#8A7D6E">&#8595;</text>
    <text x="0" y="4" font-size="12" fill="#8A7D6E">feeds into classification tasks</text>
    <text x="118" y="4" font-size="12" fill="#8A7D6E">&#8595;</text>
  </g>

  <!-- ============ CLASSIFICATION TASK CARDS ============ -->
  <!-- Sentiment analysis (Terracotta) -->
  <g transform="translate(24,446)" text-anchor="middle">
    <rect x="0" y="0" width="166" height="78" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
    <circle cx="83" cy="26" r="9" fill="none" stroke="#C66A3D" stroke-width="1.6"/>
    <circle cx="80" cy="24" r="1.2" fill="#C66A3D"/><circle cx="86" cy="24" r="1.2" fill="#C66A3D"/>
    <path d="M79 29c2 2 6 2 8 0" fill="none" stroke="#C66A3D" stroke-width="1.4" stroke-linecap="round"/>
    <text x="83" y="62" font-size="12" font-weight="600" fill="#9C4F2B">Sentiment analysis</text>
  </g>

  <!-- Hate speech detection (Deep rust) -->
  <g transform="translate(198,446)" text-anchor="middle">
    <rect x="0" y="0" width="166" height="78" rx="12" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
    <path d="M83 17l8 3v6c0 5-4 8-8 10c-4-2-8-5-8-10v-6z" fill="none" stroke="#8A3B25" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M80 25l6 6M86 25l-6 6" stroke="#8A3B25" stroke-width="1.4" stroke-linecap="round"/>
    <text x="83" y="62" font-size="12" font-weight="600" fill="#8A3B25">Hate speech detection</text>
  </g>

  <!-- Emotion analysis (Gold) -->
  <g transform="translate(372,446)" text-anchor="middle">
    <rect x="0" y="0" width="166" height="78" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
    <path d="M83 33c-5-3-9-6-9-10a4.5 4.5 0 0 1 9-1a4.5 4.5 0 0 1 9 1c0 4-4 7-9 10z" fill="none" stroke="#B97F37" stroke-width="1.6" stroke-linejoin="round"/>
    <text x="83" y="62" font-size="12" font-weight="600" fill="#B97F37">Emotion analysis</text>
  </g>

  <!-- Topic classification (Forest mid) -->
  <g transform="translate(546,446)" text-anchor="middle">
    <rect x="0" y="0" width="166" height="78" rx="12" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1.5"/>
    <path d="M77 18h6l9 9-8 8-9-9v-6a2 2 0 0 1 2-2z" fill="none" stroke="#2E7D5B" stroke-width="1.6" stroke-linejoin="round"/>
    <circle cx="81" cy="23" r="1.4" fill="#2E7D5B"/>
    <text x="83" y="62" font-size="12" font-weight="600" fill="#2E7D5B">Topic classification</text>
  </g>

  <!-- Others (Muted / neutral) -->
  <g transform="translate(720,446)" text-anchor="middle">
    <rect x="0" y="0" width="196" height="78" rx="12" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <circle cx="98" cy="26" r="9" fill="none" stroke="#8A7D6E" stroke-width="1.6"/>
    <circle cx="94" cy="26" r="1.3" fill="#8A7D6E"/><circle cx="98" cy="26" r="1.3" fill="#8A7D6E"/><circle cx="102" cy="26" r="1.3" fill="#8A7D6E"/>
    <text x="98" y="62" font-size="12" font-weight="600" fill="#8A7D6E">Others</text>
  </g>

</svg>
