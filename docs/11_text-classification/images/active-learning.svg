<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif">
  <title>Active learning — pros and cons</title>

  <!-- self-contained outer card -->
  <rect x="2" y="2" width="1020" height="252" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- PROS panel -->
  <rect x="26" y="26" width="462" height="204" rx="12" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="56" y="66" font-size="14" font-weight="700" letter-spacing="3" fill="#1F5B3F">PROS</text>

  <g>
    <path d="M58 102 l8 9 16 -19" fill="none" stroke="#2E7D5B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="94" y="107" font-size="14" fill="#2B2218">Up to 70% fewer labels for same accuracy</text>
  </g>
  <g>
    <path d="M58 146 l8 9 16 -19" fill="none" stroke="#2E7D5B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="94" y="151" font-size="14" fill="#2B2218">Naturally surfaces hard edge cases</text>
  </g>
  <g>
    <path d="M58 190 l8 9 16 -19" fill="none" stroke="#2E7D5B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="94" y="195" font-size="14" fill="#2B2218">Improves model and data simultaneously</text>
  </g>

  <!-- CONS panel -->
  <rect x="536" y="26" width="462" height="204" rx="12" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="566" y="66" font-size="14" font-weight="700" letter-spacing="3" fill="#8A3B25">CONS</text>

  <g>
    <path d="M569 93 l16 16 M585 93 l-16 16" fill="none" stroke="#C66A3D" stroke-width="3" stroke-linecap="round"/>
    <text x="604" y="107" font-size="14" fill="#2B2218">Requires annotation loop infrastructure</text>
  </g>
  <g>
    <path d="M569 137 l16 16 M585 137 l-16 16" fill="none" stroke="#C66A3D" stroke-width="3" stroke-linecap="round"/>
    <text x="604" y="151" font-size="14" fill="#2B2218">Bias toward uncertain decision boundary</text>
  </g>
  <g>
    <path d="M569 181 l16 16 M585 181 l-16 16" fill="none" stroke="#C66A3D" stroke-width="3" stroke-linecap="round"/>
    <text x="604" y="195" font-size="14" fill="#2B2218">Cold-start: needs an initial labelled seed</text>
  </g>
</svg>
