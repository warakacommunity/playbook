<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif" role="img" aria-labelledby="htrTitle">
  <title id="htrTitle">Handwritten text recognition: covering variation, then segment-and-transcribe</title>

  <!-- Outer self-contained card -->
  <rect x="2" y="2" width="916" height="656" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- Header -->
  <text x="32" y="52" font-size="24" font-weight="700" fill="#2B2218">Handwritten text recognition (HTR)</text>
  <text x="32" y="78" font-size="14" fill="#8A7D6E">The defining challenge is variation: handwriting differs by writer, era, and region.</text>

  <!-- ===================== VARIATION: many hands ===================== -->
  <rect x="32" y="100" width="856" height="166" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="52" y="130" font-size="16" font-weight="700" fill="#9C4F2B">1. Cover the variation &#8212; a dataset must span many hands</text>

  <!-- writer chips -->
  <g font-size="13" fill="#2B2218">
    <rect x="52" y="146" width="150" height="40" rx="10" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="127" y="164" text-anchor="middle" font-weight="700" fill="#C66A3D">writer</text>
    <text x="127" y="179" text-anchor="middle" fill="#8A7D6E">a different hand</text>

    <rect x="217" y="146" width="150" height="40" rx="10" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="292" y="164" text-anchor="middle" font-weight="700" fill="#1F5B3F">era</text>
    <text x="292" y="179" text-anchor="middle" fill="#8A7D6E">modern &#8594; historical</text>

    <rect x="382" y="146" width="150" height="40" rx="10" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="457" y="164" text-anchor="middle" font-weight="700" fill="#B97F37">region</text>
    <text x="457" y="179" text-anchor="middle" fill="#8A7D6E">local styles</text>

    <rect x="547" y="146" width="150" height="40" rx="10" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="622" y="164" text-anchor="middle" font-weight="700" fill="#8A3B25">script</text>
    <text x="622" y="179" text-anchor="middle" fill="#8A7D6E">Latin / Ajami</text>

    <rect x="712" y="146" width="156" height="40" rx="10" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="790" y="164" text-anchor="middle" font-weight="700" fill="#2E7D5B">online vs offline</text>
    <text x="790" y="179" text-anchor="middle" fill="#8A7D6E">strokes / scan</text>
  </g>

  <!-- Fidel reference -->
  <rect x="52" y="200" width="816" height="48" rx="10" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="70" y="222" font-size="14" font-weight="700" fill="#1F5B3F">Fidel (Amharic):</text>
  <text x="186" y="222" font-size="14" fill="#2B2218">40,000 handwritten line images from 411 different writers,</text>
  <text x="70" y="240" font-size="13" fill="#8A7D6E">deliberately capturing a broad range of styles so models generalise across hands.</text>

  <!-- Connector down to workflow -->
  <line x1="460" y1="266" x2="460" y2="296" stroke="#CBBBA4" stroke-width="2"/>
  <path d="M460 296 l-6 -9 h12 z" fill="#CBBBA4"/>

  <!-- ===================== WORKFLOW: segment then transcribe ===================== -->
  <text x="32" y="320" font-size="16" font-weight="700" fill="#2B2218">2. Workflow &#8212; segment the page, then transcribe each region</text>

  <!-- Step A: the page with lines/regions -->
  <rect x="32" y="336" width="296" height="240" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
  <text x="52" y="364" font-size="15" font-weight="700" fill="#B97F37">A. Segment lines &amp; regions</text>

  <!-- mini page -->
  <rect x="64" y="378" width="232" height="184" rx="8" fill="#FFFFFF" stroke="#E7DDCB" stroke-width="1.5"/>
  <!-- text-line boxes (green) -->
  <rect x="78" y="392" width="170" height="22" rx="5" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
  <line x1="86" y1="403" x2="240" y2="403" stroke="#CBBBA4" stroke-width="2" stroke-dasharray="3 4"/>
  <rect x="78" y="420" width="204" height="22" rx="5" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
  <line x1="86" y1="431" x2="274" y2="431" stroke="#CBBBA4" stroke-width="2" stroke-dasharray="3 4"/>
  <rect x="78" y="448" width="150" height="22" rx="5" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
  <line x1="86" y1="459" x2="220" y2="459" stroke="#CBBBA4" stroke-width="2" stroke-dasharray="3 4"/>
  <!-- marginalia (terracotta) -->
  <rect x="252" y="448" width="32" height="44" rx="5" fill="none" stroke="#C66A3D" stroke-width="1.5"/>
  <!-- unclear (rust) -->
  <rect x="78" y="478" width="96" height="22" rx="5" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
  <!-- legend -->
  <g font-size="12">
    <rect x="64" y="516" width="14" height="14" rx="3" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
    <text x="84" y="528" fill="#2B2218">Text line</text>
    <rect x="150" y="516" width="14" height="14" rx="3" fill="none" stroke="#C66A3D" stroke-width="1.5"/>
    <text x="170" y="528" fill="#2B2218">Marginalia</text>
    <rect x="248" y="516" width="14" height="14" rx="3" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
    <text x="268" y="528" fill="#2B2218">Unclear</text>
  </g>
  <text x="64" y="552" font-size="13" fill="#8A7D6E">Draw a box around each line / region.</text>

  <!-- arrow A -> B -->
  <line x1="328" y1="456" x2="368" y2="456" stroke="#CBBBA4" stroke-width="2"/>
  <path d="M368 456 l-9 -6 v12 z" fill="#CBBBA4"/>

  <!-- Step B: transcribe per region -->
  <rect x="376" y="336" width="296" height="240" rx="12" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="396" y="364" font-size="15" font-weight="700" fill="#1F5B3F">B. Transcribe each region</text>

  <g font-size="13">
    <rect x="396" y="378" width="256" height="40" rx="8" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <rect x="404" y="386" width="60" height="24" rx="5" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
    <text x="434" y="402" text-anchor="middle" fill="#1F5B3F" font-size="12">line 1</text>
    <text x="476" y="403" fill="#2B2218">&#8594; typed transcription</text>

    <rect x="396" y="426" width="256" height="40" rx="8" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <rect x="404" y="434" width="60" height="24" rx="5" fill="none" stroke="#1F5B3F" stroke-width="1.5"/>
    <text x="434" y="450" text-anchor="middle" fill="#1F5B3F" font-size="12">line 2</text>
    <text x="476" y="451" fill="#2B2218">&#8594; typed transcription</text>

    <rect x="396" y="474" width="256" height="40" rx="8" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <rect x="404" y="482" width="60" height="24" rx="5" fill="none" stroke="#8A3B25" stroke-width="1.5"/>
    <text x="434" y="498" text-anchor="middle" fill="#8A3B25" font-size="12">unclear</text>
    <text x="476" y="499" fill="#8A7D6E">&#8594; marked, not guessed</text>
  </g>
  <text x="396" y="540" font-size="13" fill="#8A7D6E">perRegion text box keeps each</text>
  <text x="396" y="557" font-size="13" fill="#8A7D6E">transcript bound to its line image.</text>

  <!-- arrow B -> export -->
  <line x1="672" y1="456" x2="712" y2="456" stroke="#CBBBA4" stroke-width="2"/>
  <path d="M712 456 l-9 -6 v12 z" fill="#CBBBA4"/>

  <!-- Step C: export / score -->
  <rect x="720" y="336" width="168" height="240" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
  <text x="740" y="364" font-size="15" font-weight="700" fill="#B97F37">C. Export &amp; score</text>
  <g font-size="13" fill="#2B2218">
    <rect x="736" y="382" width="136" height="34" rx="8" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="804" y="403" text-anchor="middle">line image + text</text>
    <rect x="736" y="426" width="136" height="34" rx="8" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="804" y="447" text-anchor="middle" font-weight="700" fill="#C66A3D">CER</text>
    <rect x="736" y="470" width="136" height="34" rx="8" fill="#FFFFFF" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="804" y="491" text-anchor="middle">WER alongside</text>
  </g>
  <text x="736" y="532" font-size="13" fill="#8A7D6E">CER is the fairer</text>
  <text x="736" y="549" font-size="13" fill="#8A7D6E">measure for these scripts.</text>

  <!-- ===================== Expert note: Ajami / historical ===================== -->
  <rect x="32" y="592" width="856" height="48" rx="12" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
  <text x="52" y="614" font-size="14" font-weight="700" fill="#8A3B25">Historical &amp; Ajami manuscripts:</text>
  <text x="272" y="614" font-size="13.5" fill="#2B2218">need an expert who can read the hand and the historical orthography.</text>
  <text x="52" y="632" font-size="13" fill="#8A7D6E">Ajami HTR segmented and transcribed centuries-old Fulfulde and Hausa pages that existing Arabic-script models could not read.</text>
</svg>
