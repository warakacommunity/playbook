<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">AfriPlaybook data-collection lifecycle</title>
  <desc id="desc">A connected pipeline for building African-language datasets: choose modality and sources, then collection methods (community sourcing, web scraping, APIs, institutional partnerships), then cleaning and preprocessing, provenance and traceability, and ethics, bias and governance. Community and purpose-built routes are more stable than scraping and APIs.</desc>

  <!-- outer self-contained card -->
  <rect x="8" y="8" width="1164" height="744" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- header -->
  <text x="32" y="52" font-size="24" font-weight="700" fill="#2B2218">The data-collection lifecycle</text>
  <text x="32" y="78" font-size="14" fill="#8A7D6E">Gathering raw material for African-language datasets — modality and sources through to governance</text>
  <line x1="32" y1="94" x2="1148" y2="94" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- ===================== STAGE 1: modality & sources ===================== -->
  <!-- Modality box -->
  <rect x="32" y="130" width="216" height="190" rx="12" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="48" y="158" font-size="15" font-weight="700" fill="#1F5B3F">1 · Choose modality</text>
  <text x="48" y="184" font-size="13" fill="#2B2218">Text</text>
  <text x="48" y="206" font-size="13" fill="#2B2218">Speech &amp; audio</text>
  <text x="48" y="228" font-size="13" fill="#2B2218">Images</text>
  <text x="48" y="250" font-size="13" fill="#2B2218">Video</text>
  <text x="48" y="272" font-size="13" fill="#2B2218">Multimodal data</text>
  <text x="48" y="300" font-size="12" fill="#8A7D6E">Decided first — it drives everything</text>

  <!-- Sources box -->
  <rect x="280" y="130" width="244" height="190" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
  <text x="296" y="158" font-size="15" font-weight="700" fill="#B97F37">2 · Map data sources</text>
  <text x="296" y="184" font-size="13" fill="#2B2218">Open web</text>
  <text x="296" y="206" font-size="13" fill="#2B2218">Institutional &amp; gov archives</text>
  <text x="296" y="228" font-size="13" fill="#2B2218">Community &amp; oral sources</text>
  <text x="296" y="250" font-size="13" fill="#2B2218">Broadcast &amp; media archives</text>
  <text x="296" y="272" font-size="13" fill="#2B2218">Existing datasets &amp; corpora</text>
  <text x="296" y="294" font-size="13" fill="#2B2218">Religious &amp; literary texts</text>
  <text x="296" y="312" font-size="12" fill="#8A7D6E">Source ≠ method</text>

  <!-- connector modality -> sources -->
  <line x1="248" y1="225" x2="280" y2="225" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 2: collection methods ===================== -->
  <text x="588" y="124" font-size="15" font-weight="700" fill="#8A3B25">3 · Collection methods</text>

  <!-- Community sourcing (stable) -->
  <rect x="588" y="132" width="262" height="58" rx="10" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="604" y="156" font-size="13.5" font-weight="700" fill="#1F5B3F">Community sourcing</text>
  <text x="604" y="176" font-size="12" fill="#2E7D5B">Purpose-built collection campaigns</text>
  <circle cx="834" cy="150" r="6" fill="#2E7D5B"/>

  <!-- Institutional partnerships (stable) -->
  <rect x="588" y="200" width="262" height="58" rx="10" fill="#E7F1EC" stroke="#1F5B3F" stroke-width="1.5"/>
  <text x="604" y="224" font-size="13.5" font-weight="700" fill="#1F5B3F">Institutional partnerships</text>
  <text x="604" y="244" font-size="12" fill="#2E7D5B">Requests &amp; bulk exports from archives</text>
  <circle cx="834" cy="218" r="6" fill="#2E7D5B"/>

  <!-- Web scraping (less stable) -->
  <rect x="588" y="268" width="262" height="58" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="604" y="292" font-size="13.5" font-weight="700" fill="#9C4F2B">Web scraping</text>
  <text x="604" y="312" font-size="12" fill="#C66A3D">Brittle — pages and layouts change</text>
  <circle cx="834" cy="286" r="6" fill="#C66A3D"/>

  <!-- APIs (less stable) -->
  <rect x="588" y="336" width="262" height="58" rx="10" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="604" y="360" font-size="12" font-weight="700" fill="#9C4F2B">Application programming interfaces</text>
  <text x="604" y="380" font-size="12" fill="#C66A3D">Brittle — terms, limits &amp; access shift</text>
  <circle cx="834" cy="354" r="6" fill="#C66A3D"/>

  <!-- stability legend -->
  <rect x="588" y="410" width="262" height="58" rx="10" fill="#FFFFFF" stroke="#E7DDCB" stroke-width="1.5"/>
  <circle cx="606" cy="430" r="6" fill="#2E7D5B"/>
  <text x="620" y="435" font-size="12" fill="#2B2218">Community / purpose-built — more stable</text>
  <circle cx="606" cy="452" r="6" fill="#C66A3D"/>
  <text x="620" y="457" font-size="12" fill="#2B2218">Scraping / APIs — less stable, higher upkeep</text>

  <!-- connector sources -> methods (fan in) -->
  <line x1="524" y1="225" x2="560" y2="225" stroke="#CBBBA4" stroke-width="2.5"/>
  <path d="M560 225 L560 161 L588 161" fill="none" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M560 225 L588 225" fill="none" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M560 225 L560 297 L588 297" fill="none" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M560 225 L560 365 L588 365" fill="none" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 3: cleaning ===================== -->
  <rect x="906" y="132" width="242" height="262" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
  <text x="922" y="160" font-size="15" font-weight="700" fill="#9C4F2B">4 · Cleaning &amp; preprocessing</text>
  <text x="922" y="188" font-size="13" fill="#2B2218">Deduplication</text>
  <text x="922" y="210" font-size="13" fill="#2B2218">Normalization</text>
  <text x="922" y="232" font-size="13" fill="#2B2218">Filtering</text>
  <text x="922" y="254" font-size="13" fill="#2B2218">Language detection</text>
  <text x="922" y="276" font-size="13" fill="#2B2218">Formatting (JSON / CSV)</text>
  <line x1="922" y1="294" x2="1132" y2="294" stroke="#F3E0D8" stroke-width="1.5"/>
  <text x="922" y="320" font-size="12" fill="#8A7D6E">Turns brittle raw material into</text>
  <text x="922" y="338" font-size="12" fill="#8A7D6E">reliable, consistent data ready</text>
  <text x="922" y="356" font-size="12" fill="#8A7D6E">for downstream training &amp; eval.</text>

  <!-- connector methods -> cleaning (fan out to single) -->
  <path d="M850 161 L878 161 L878 240 L906 240" fill="none" stroke="#CBBBA4" stroke-width="2.5"/>
  <path d="M850 229 L878 229 L878 240" fill="none" stroke="#CBBBA4" stroke-width="2.5"/>
  <path d="M850 297 L878 297 L878 240" fill="none" stroke="#CBBBA4" stroke-width="2.5"/>
  <path d="M850 365 L878 365 L878 240 L906 240" fill="none" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===================== STAGE 4 & 5: bottom row ===================== -->
  <!-- Provenance -->
  <rect x="280" y="540" width="412" height="180" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
  <text x="300" y="570" font-size="15" font-weight="700" fill="#B97F37">5 · Provenance &amp; traceability</text>
  <text x="300" y="598" font-size="13" fill="#2B2218">Source tracking — URLs &amp; references, contributors</text>
  <text x="300" y="620" font-size="13" fill="#2B2218">Collection context — when, where &amp; how</text>
  <text x="300" y="642" font-size="13" fill="#2B2218">Data lineage — evolution &amp; versioning</text>
  <text x="300" y="672" font-size="12" fill="#8A7D6E">Supports reproducibility, auditing</text>
  <text x="300" y="690" font-size="12" fill="#8A7D6E">and accountability across the pipeline.</text>

  <!-- Ethics -->
  <rect x="724" y="540" width="424" height="180" rx="12" fill="#F3E0D8" stroke="#8A3B25" stroke-width="1.5"/>
  <text x="744" y="570" font-size="15" font-weight="700" fill="#8A3B25">6 · Ethics, bias &amp; governance</text>
  <text x="744" y="598" font-size="13" fill="#2B2218">Bias detection &amp; mitigation — source &amp; annotation bias</text>
  <text x="744" y="620" font-size="13" fill="#2B2218">PII detection &amp; removal</text>
  <text x="744" y="642" font-size="13" fill="#2B2218">Consent, licensing &amp; transparency</text>
  <text x="744" y="672" font-size="12" fill="#8A7D6E">Responsible practice spanning the</text>
  <text x="744" y="690" font-size="12" fill="#8A7D6E">whole data lifecycle, not a final gate.</text>

  <!-- connector cleaning -> provenance -->
  <path d="M1027 394 L1027 460 L486 460 L486 540" fill="none" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- connector provenance -> ethics -->
  <line x1="692" y1="630" x2="724" y2="630" stroke="#CBBBA4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- governance spine label -->
  <rect x="32" y="540" width="216" height="180" rx="12" fill="#FFFFFF" stroke="#E7DDCB" stroke-width="1.5"/>
  <text x="48" y="568" font-size="14" font-weight="700" fill="#2B2218">Read the pipeline</text>
  <text x="48" y="594" font-size="12.5" fill="#8A7D6E">Each stage feeds the next, but</text>
  <text x="48" y="612" font-size="12.5" fill="#8A7D6E">provenance and ethics run</text>
  <text x="48" y="630" font-size="12.5" fill="#8A7D6E">alongside the entire flow.</text>
  <line x1="48" y1="648" x2="232" y2="648" stroke="#E7DDCB" stroke-width="1.5"/>
  <text x="48" y="672" font-size="12.5" fill="#2B2218">Method choice sets how much</text>
  <text x="48" y="690" font-size="12.5" fill="#2B2218">upkeep the rest of the work needs.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#CBBBA4"/>
    </marker>
  </defs>
</svg>
