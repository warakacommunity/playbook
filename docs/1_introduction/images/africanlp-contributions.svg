<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Bar chart: where AfricaNLP research effort has gone, 2005 to 2025. Methods 53 percent, datasets 21 percent, tasks 11 percent, languages 11 percent, community 4 percent.">
  <rect x="0" y="0" width="720" height="330" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="28" y="40" font-size="18" font-weight="700" fill="#1f2937">Where AfricaNLP effort has gone, 2005&#8211;2025</text>
  <text x="28" y="61" font-size="13" fill="#6b7280">Share of contribution sentences, by what the work produced</text>

  <!-- Methods -->
  <text x="28" y="103" font-size="13.5" fill="#374151">Methods</text>
  <rect x="150" y="90" width="477" height="20" rx="3" fill="#C66A3D"/>
  <text x="635" y="105" font-size="13.5" font-weight="700" fill="#9C4F2B">53%</text>

  <!-- Datasets -->
  <text x="28" y="147" font-size="13.5" fill="#374151">Datasets</text>
  <rect x="150" y="134" width="190" height="20" rx="3" fill="#C66A3D"/>
  <text x="348" y="149" font-size="13.5" font-weight="700" fill="#9C4F2B">21%</text>
  <text x="430" y="149" font-size="12.5" font-style="italic" fill="#B97F37">the bottleneck this playbook targets</text>

  <!-- Tasks -->
  <text x="28" y="191" font-size="13.5" fill="#374151">Tasks</text>
  <rect x="150" y="178" width="99" height="20" rx="3" fill="#B7A893"/>
  <text x="257" y="193" font-size="13.5" fill="#6b7280">11%</text>

  <!-- Languages -->
  <text x="28" y="235" font-size="13.5" fill="#374151">Languages</text>
  <rect x="150" y="222" width="99" height="20" rx="3" fill="#B7A893"/>
  <text x="257" y="237" font-size="13.5" fill="#6b7280">11%</text>

  <!-- Community -->
  <text x="28" y="279" font-size="13.5" fill="#374151">Community</text>
  <rect x="150" y="266" width="36" height="20" rx="3" fill="#B7A893"/>
  <text x="194" y="281" font-size="13.5" fill="#6b7280">4%</text>

  <text x="28" y="315" font-size="11.5" fill="#9ca3af">Recreated from Belay et al. (2025), Table 4. Method and dataset shares aggregate knowledge- and artifact-type sentences.</text>
</svg>
