<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="100%" font-family="Inter,'Segoe UI',Roboto,system-ui,sans-serif">
  <title>Extractive vs Abstractive Summarization</title>

  <!-- Outer self-contained card -->
  <rect x="8" y="8" width="944" height="544" rx="14" fill="#FBF7F0" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- Header -->
  <text x="32" y="52" font-size="22" font-weight="700" fill="#2B2218">Summarization: extractive vs abstractive</text>
  <text x="32" y="76" font-size="13.5" fill="#8A7D6E">Condense a longer text into a shorter one that preserves its meaning. Two forms, two trade-offs.</text>
  <line x1="32" y1="92" x2="928" y2="92" stroke="#E7DDCB" stroke-width="1.5"/>

  <!-- ============ SOURCE DOCUMENT (left) ============ -->
  <g>
    <rect x="32" y="206" width="218" height="158" rx="12" fill="#FBF7F0" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="48" y="232" font-size="14" font-weight="700" fill="#2B2218">Source document</text>
    <text x="48" y="252" font-size="12.5" fill="#8A7D6E">long text · health, news, gov.</text>
    <!-- text lines mimic -->
    <rect x="48" y="266" width="186" height="9" rx="4.5" fill="#E7DDCB"/>
    <rect x="48" y="282" width="186" height="9" rx="4.5" fill="#E7DDCB"/>
    <rect x="48" y="298" width="150" height="9" rx="4.5" fill="#E7DDCB"/>
    <rect x="48" y="314" width="186" height="9" rx="4.5" fill="#E7DDCB"/>
    <rect x="48" y="330" width="120" height="9" rx="4.5" fill="#E7DDCB"/>
  </g>

  <!-- Flow arrows from source to the two branches -->
  <defs>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2E7D5B"/>
    </marker>
    <marker id="arrowTerra" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#C66A3D"/>
    </marker>
  </defs>

  <!-- to extractive (top) -->
  <path d="M250 255 C 300 255, 300 178, 358 178" fill="none" stroke="#2E7D5B" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- to abstractive (bottom) -->
  <path d="M250 315 C 300 315, 300 392, 358 392" fill="none" stroke="#C66A3D" stroke-width="2" marker-end="url(#arrowTerra)"/>

  <!-- ============ EXTRACTIVE (green, top) ============ -->
  <g>
    <rect x="362" y="116" width="296" height="126" rx="12" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1.5"/>
    <circle cx="384" cy="142" r="9" fill="#1F5B3F"/>
    <text x="403" y="147" font-size="15" font-weight="700" fill="#1F5B3F">Extractive</text>
    <text x="384" y="170" font-size="12.8" fill="#2B2218">Selects the most important</text>
    <text x="384" y="188" font-size="12.8" fill="#2B2218">sentences from the source.</text>
    <text x="384" y="214" font-size="12.5" fill="#2E7D5B" font-weight="600">+ Avoids invention (faithful)</text>
    <text x="384" y="231" font-size="12.5" fill="#8A7D6E">– Can be clumsy; salience is hard</text>
  </g>

  <!-- ============ ABSTRACTIVE (terracotta, bottom) ============ -->
  <g>
    <rect x="362" y="328" width="296" height="126" rx="12" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1.5"/>
    <circle cx="384" cy="354" r="9" fill="#9C4F2B"/>
    <text x="403" y="359" font-size="15" font-weight="700" fill="#9C4F2B">Abstractive</text>
    <text x="384" y="382" font-size="12.8" fill="#2B2218">Rewrites the content in new</text>
    <text x="384" y="400" font-size="12.8" fill="#2B2218">words — harder, more useful.</text>
    <text x="384" y="426" font-size="12.5" fill="#C66A3D" font-weight="600">+ More natural, more useful</text>
    <text x="384" y="443" font-size="12.5" fill="#8A7D6E">– More prone to error</text>
  </g>

  <!-- output arrows to summaries -->
  <path d="M658 179 C 700 179, 700 179, 742 179" fill="none" stroke="#2E7D5B" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M658 391 C 700 391, 700 391, 742 391" fill="none" stroke="#C66A3D" stroke-width="2" marker-end="url(#arrowTerra)"/>

  <!-- extractive summary chip -->
  <g>
    <rect x="746" y="138" width="178" height="82" rx="10" fill="#FBF7F0" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="762" y="162" font-size="12.5" font-weight="700" fill="#1F5B3F">Summary</text>
    <rect x="762" y="174" width="146" height="8" rx="4" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1"/>
    <rect x="762" y="190" width="120" height="8" rx="4" fill="#E7F1EC" stroke="#2E7D5B" stroke-width="1"/>
    <text x="762" y="214" font-size="11.5" fill="#8A7D6E">copied sentences</text>
  </g>

  <!-- abstractive summary chip -->
  <g>
    <rect x="746" y="350" width="178" height="82" rx="10" fill="#FBF7F0" stroke="#CBBBA4" stroke-width="1.5"/>
    <text x="762" y="374" font-size="12.5" font-weight="700" fill="#9C4F2B">Summary</text>
    <rect x="762" y="386" width="146" height="8" rx="4" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/>
    <rect x="762" y="402" width="100" height="8" rx="4" fill="#FBEDE3" stroke="#C66A3D" stroke-width="1"/>
    <text x="762" y="426" font-size="11.5" fill="#8A7D6E">reworded text</text>
  </g>

  <!-- ============ FAITHFULNESS RISK callout (abstractive side) ============ -->
  <g>
    <rect x="362" y="466" width="562" height="76" rx="12" fill="#F8ECD6" stroke="#B97F37" stroke-width="1.5"/>
    <!-- warning mark -->
    <path d="M392 482 L408 512 L376 512 Z" fill="none" stroke="#8A3B25" stroke-width="2" stroke-linejoin="round"/>
    <text x="392" y="505" font-size="13" font-weight="700" fill="#8A3B25" text-anchor="middle">!</text>
    <text x="422" y="490" font-size="13.5" font-weight="700" fill="#8A3B25">Faithfulness risk</text>
    <text x="422" y="510" font-size="12.5" fill="#2B2218">A summary that reads well but states what the source did not is worse than no</text>
    <text x="422" y="528" font-size="12.5" fill="#2B2218">summary. Always add a human faithfulness check.</text>
  </g>

  <!-- data footnote -->
  <text x="32" y="396" font-size="11.5" fill="#8A7D6E">Data: XL-Sum (BBC)</text>
  <text x="32" y="413" font-size="11.5" fill="#8A7D6E">Eval: ROUGE · BERTScore</text>
</svg>
